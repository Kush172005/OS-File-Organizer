name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (API tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: file-organizer/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: file-organizer/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start server and run API tests
        run: |
          node server.js &
          echo "Waiting for server on port 3001..."
          for i in $(seq 1 30); do
            if curl -sf https://os-file-organizer-api.vercel.app > /dev/null; then
              echo "Server is up."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server did not start in time."
              exit 1
            fi
            sleep 1
          done
          export BASE_URL=https://os-file-organizer-api.vercel.app
          bash test-api.sh

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: file-organizer/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: file-organizer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
